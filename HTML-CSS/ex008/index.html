<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com Listas</h1>
    <h2>Listas Ordenadas</h2>
    <ol type="A">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
    <h2>Listas Não Ordenadas</h2>
    <ul type="square">
        <li>Item A</li>
        <li>Item B</li>
        <li>Item C</li>
    </ul>
    <h2>Minhas Linguagens favoritas</h2>
    <ol>
        <li>Python</li>
        <li>Linguagens para web</li>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
        <li>Java</li>
        <li>C#</li>
        <li>Ruby</li>
    </ol>
</body>
</html>
