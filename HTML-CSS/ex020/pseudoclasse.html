<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
</head>
<body>
    <h1>Exemplo de Pseudo-classes em CSS</h1>
    <p>Este é um exemplo simples de como usar pseudo-classes em CSS para estilizar elementos HTML com base em seu estado.</p>

    <a href="#">Link Normal</a><br>
    <a href="#" class="visited-link">Link Visitado</a><br>
    <a href="#" class="hover-link">Link com Hover</a><br>
    <a href="#" class="active-link">Link Ativo</a><br>

    <style>
        a {
            color: blue;
            text-decoration: none;
        }
        a:visited {
            color: purple;
        }
        a:hover {
            color: red;
            text-decoration: underline;
        }
        a:active {
            color: green;
        }
    </style> 
</body>
</html>
