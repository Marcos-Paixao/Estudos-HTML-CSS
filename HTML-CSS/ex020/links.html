<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            padding: 20px;
        }
        a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: #8b1a1a;
        }
        a:hover {
            text-decoration: underline;
            color: #4fe709;
        }
        a:active {
            color: #e9ba1e;
        }
        a::after {
            content: " 🔗 ";
        }
    </style>
</head>
