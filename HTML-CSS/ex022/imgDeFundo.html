<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificando posição da IMG de fundo</title>
    <style>
        div.retng {
            background-image: url('paiefilho.jpg');
            border: 2px solid white;
            width: 900px;
            height: 400px;
            border-radius: 20px;
            margin: auto;
            margin-bottom: 10px;
        }

        div#qdd1{
            background-position: left top;
        }
        div#qdd2{
            background-position: left center;
        }
        div#qdd3{
            background-position: left bottom;
        }
    </style>
</head>
<body>
    <div class="retng" id="qdd1"></div>
    <div class="retng" id="qdd2"></div>
    <div class="retng" id="qdd3"></div>
</body>
</html>
